<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lain d20 roller</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🎲 lain's d20 roller</h1>
    <p class="subtitle">Roll the die and let fate decide.</p>

    <div class="dice-box">
      <div id="result">?</div>
    </div>

    <button id="rollButton">Roll d20</button>
    <p id="message">Press the button to roll.</p>

    <div class="history-box">
      <h2>Recent Rolls</h2>
      <ul id="history"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
