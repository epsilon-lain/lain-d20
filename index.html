<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fate Check | d20</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div class="screen-vignette" aria-hidden="true"></div>

  <main class="scene-shell">
    <header class="title-block">
      <p class="eyebrow">Ritual of Chance</p>
      <h1>Fate Check</h1>
      <p class="subtitle">Steel your resolve, then cast the die.</p>
    </header>

    <section class="dice-stage" aria-label="3D d20 scene">
      <div id="threeCanvas" class="three-canvas"></div>
      <div id="loadStatus" class="load-status" role="status" aria-live="polite"></div>

      <div id="resultOverlay" class="result-overlay" data-tone="neutral">
        <p class="result-label">Result</p>
        <p id="resultValue" class="result-value">—</p>
        <p id="resultMessage" class="result-message">Roll to let fate decide.</p>
      </div>
    </section>

    <section class="controls">
      <button id="rollButton" type="button">Roll d20</button>
      <p id="helperText" class="helper-text">Click the die or press the button to tempt fate.</p>
    </section>

    <section class="history-panel" aria-label="Recent rolls">
      <h2>Recent</h2>
      <ul id="history"></ul>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
